<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f1115">
<meta name="robots" content="noindex, nofollow">
<title>Admin Login | Mamunur Rashid</title>
<link rel="icon" type="image/png" href="../Mamunur-Rashid.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="brand">Mamunur Rashid</div>
      <div class="sub">Admin Panel</div>
    </div>

    <h1>Sign in</h1>
    <p class="muted">Enter your credentials to manage your portfolio.</p>

    <div id="alert" class="alert hidden"></div>

    <form id="login-form" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" class="input" autocomplete="email" placeholder="you@example.com" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" class="input" autocomplete="current-password" placeholder="Your password" required minlength="6">
      </div>
      <button type="submit" id="submit-btn" class="btn btn-primary btn-block">Sign in</button>
    </form>

    <hr>
    <div class="row">
      <a href="forgot.html">Forgot password?</a>
      <a href="../index.html" class="muted">&larr; Back to site</a>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
import { firebaseConfig, ADMIN_EMAIL } from "./firebase-config.js";

const alertBox = document.getElementById('alert');
const form = document.getElementById('login-form');
const btn = document.getElementById('submit-btn');

function showAlert(msg, type='error'){
  alertBox.className = 'alert alert-' + type;
  alertBox.textContent = msg;
  alertBox.classList.remove('hidden');
}

if (!firebaseConfig || firebaseConfig.apiKey === "YOUR_API_KEY") {
  showAlert("Firebase is not configured yet. Open admin/firebase-config.js and add your project credentials. See SETUP-FIREBASE.md.", 'info');
}

let app, auth;
try {
  app = initializeApp(firebaseConfig);
  auth = getAuth(app);
  await setPersistence(auth, browserLocalPersistence);

  // If already signed in, redirect to dashboard
  onAuthStateChanged(auth, (user) => {
    if (user) {
      window.location.replace('dashboard.html');
    }
  });
} catch (e) {
  console.error(e);
  showAlert("Firebase init failed: " + e.message);
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if (email.toLowerCase() !== ADMIN_EMAIL.toLowerCase()) {
    showAlert("This email is not authorized. Only the admin email can log in.");
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Signing in...';
  alertBox.classList.add('hidden');

  try {
    await signInWithEmailAndPassword(auth, email, password);
    window.location.replace('dashboard.html');
  } catch (err) {
    let msg = "Sign in failed.";
    if (err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password' || err.code === 'auth/user-not-found') msg = "Wrong email or password.";
    else if (err.code === 'auth/too-many-requests') msg = "Too many attempts. Try again later or reset your password.";
    else if (err.code === 'auth/network-request-failed') msg = "Network error. Check your internet.";
    else if (err.message) msg = err.message;
    showAlert(msg);
    btn.disabled = false;
    btn.textContent = 'Sign in';
  }
});
</script>
</body>
</html>
