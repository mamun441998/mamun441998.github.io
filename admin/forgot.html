<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f1115">
<meta name="robots" content="noindex, nofollow">
<title>Reset Password | Mamunur Rashid Admin</title>
<link rel="icon" type="image/png" href="../Mamunur-Rashid.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="brand">Mamunur Rashid</div>
      <div class="sub">Reset Password</div>
    </div>

    <h1>Forgot your password?</h1>
    <p class="muted">Enter your admin email. We'll send a password reset link to your inbox.</p>

    <div id="alert" class="alert hidden"></div>

    <form id="reset-form" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" class="input" autocomplete="email" placeholder="mamun441998@gmail.com" required>
      </div>
      <button type="submit" id="submit-btn" class="btn btn-primary btn-block">Send reset link</button>
    </form>

    <hr>
    <div class="row">
      <a href="login.html">&larr; Back to login</a>
      <a href="../index.html" class="muted">View site</a>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
import { firebaseConfig, ADMIN_EMAIL } from "./firebase-config.js";

const alertBox = document.getElementById('alert');
const form = document.getElementById('reset-form');
const btn = document.getElementById('submit-btn');

function showAlert(msg, type='error'){
  alertBox.className = 'alert alert-' + type;
  alertBox.textContent = msg;
  alertBox.classList.remove('hidden');
}

if (!firebaseConfig || firebaseConfig.apiKey === "YOUR_API_KEY") {
  showAlert("Firebase is not configured yet. Open admin/firebase-config.js. See SETUP-FIREBASE.md.", 'info');
}

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();

  if (email.toLowerCase() !== ADMIN_EMAIL.toLowerCase()) {
    showAlert("Only the admin email can request a password reset.");
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Sending...';
  alertBox.classList.add('hidden');

  try {
    await sendPasswordResetEmail(auth, email);
    showAlert("Reset link sent. Check your inbox at " + email + " (also check Spam folder).", 'success');
    btn.textContent = 'Sent ✓';
    setTimeout(() => { window.location.href = 'login.html'; }, 4000);
  } catch (err) {
    let msg = "Could not send reset email.";
    if (err.code === 'auth/user-not-found') msg = "No admin account found. Create one in Firebase Console first.";
    else if (err.code === 'auth/invalid-email') msg = "Invalid email format.";
    else if (err.code === 'auth/too-many-requests') msg = "Too many requests. Try again later.";
    else if (err.message) msg = err.message;
    showAlert(msg);
    btn.disabled = false;
    btn.textContent = 'Send reset link';
  }
});
</script>
</body>
</html>
